<!doctype html>
<html lang="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Polar Web | Moderne Webdesign</title>
    <link rel="stylesheet" href="index.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header class="navbar">
      <div class="container">
        <div class="logo">
          <img
            src="Adobe Express - file.png"
            alt="Polar Web Logo"
            class="logo-img"
          />
          <span class="logo-text">POLAR<span class="bold">WEB</span></span>
        </div>

        <nav class="nav-menu">
          <ul>
            <li><a href="#tjenester">Tjenester</a></li>
            <li><a href="#prosjekter">Prosjekter</a></li>
            <li><a href="#om-oss">Om oss</a></li>
          </ul>
        </nav>

        <div class="nav-cta">
          <a href="#kontakt" class="btn-primary">Start et prosjekt</a>
        </div>
      </div>
    </header>

    <section class="hero">
      <h1>
        Krystallklart design. <br />
        <span class="blue-text">Iskald presisjon.</span>
      </h1>
      <p>Vi bygger de digitale løsningene bedriften din trenger for å vokse.</p>
    </section>
    <section class="interactive-globe">
      <div class="reveal-container" id="mask-container">
        <img src="Uten navn-2.png" alt="Isete jordklode" class="base-layer" />

        <div class="mask-layer" id="mask-layer">
          <img src="Uten navn-1.png" alt="Isbjørn i snøen" class="reveal-img" />
          <div class="reveal-text">
            <h2></h2>
            <p></p>
          </div>
        </div>
      </div>
    </section>
  </body>
  <script src="app.js"></script>
</html>
